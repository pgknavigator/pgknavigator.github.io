<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PGK Navigator - Coming Soon</title>
  <!-- Menyisipkan font modern Inter agar nyaman dibaca -->
  <link rel="stylesheet" href="https://googleapis.com">
  
  <style>
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #ffffff;
      color: #333333;
    }
    /* Mengatur tata letak logo dan teks agar sejajar di kiri */
    .header-container {
      display: flex;
      align-items: center;
      gap: 15px;
      padding-bottom: 15px;
    }
    .logo-brand {
      height: 60px;
      width: auto;
      object-fit: contain;
    }
    .text-brand {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }
    .brand-pgk {
      font-size: 24px;
      font-weight: 700;
      color: #0b3c5d;
    }
    .brand-navigator {
      font-size: 14px;
      font-weight: 600;
      color: #d9a74a;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    hr {
      border: 0;
      border-top: 1px solid #e0e0e0;
      margin-top: 0;
      margin-bottom: 40px;
    }
    /* Mengatur semua konten utama agar rata tengah */
    .main-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      max-width: 600px;
      margin: 0 auto; /* Membuat konten berada di tengah-tengah layar laptop */
    }
    /* Mengatur gaya teks Coming Soon kekinian */
    .coming-soon-title {
      font-size: 32px;
      font-weight: 700;
      color: #0b3c5d; /* Senada dengan warna biru logo */
      margin-bottom: 25px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    /* Mengatur wadah video agar responsif dan pas di HP maupun desktop */
    .video-container {
      width: 100%;
      max-width: 450px; /* Ukuran video yang pas dan proporsional */
      border-radius: 12px; /* Membuat sudut video sedikit melengkung halus */
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1); /* Efek bayangan tipis agar premium */
      margin-bottom: 30px;
    }
    video {
      width: 100%;
      height: auto;
      display: block;
    }
    /* Mengatur gaya tulisan slogan nilai proyek */
    .slogan-text {
      font-size: 18px;
      font-weight: 600;
      color: #d9a74a; /* Senada dengan warna emas logo */
      letter-spacing: 3px; /* Jarak antar huruf agar terlihat premium */
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <!-- Bagian Atas / Header Berlogo (Tetap Di Kiri) -->
  <div class="header-container">
    <img src="logo.jpeg" alt="Logo PGK Navigator" class="logo-brand">
    <div class="text-brand">
      <span class="brand-pgk">PGK</span>
      <span class="brand-navigator">Navigator</span>
    </div>
  </div>
  
  <hr>

  <!-- Bagian Isi Konten Baru (Rata Tengah) -->
  <div class="main-content">
    
    <!-- 1. Kalimat Coming Soon -->
    <div class="coming-soon-title">Coming Soon</div>
    
    <!-- 2. Pemutar Video Animasi MP4 Otomatis -->
    <div class="video-container">
      <!-- playsinline, autoplay, muted, dan loop membuat video berputar otomatis terus-menerus tanpa suara seperti animasi GIF -->
      <video autoplay muted loop playsinline>
        <source src="animasi.mp4" type="video/mp4">
        Browser Anda tidak mendukung pemutar video.
      </video>
    </div>
    
    <!-- 3. Slogan Nilai Proyek -->
    <div class="slogan-text">Explore • Connect • Grow</div>
    
  </div>

</body>
</html>
