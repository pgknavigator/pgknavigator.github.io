<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PGK Navigator - Coming Soon</title>
  <!-- Menyisipkan font modern Inter dan font tulisan sambung League Script -->
  <link rel="stylesheet" href="https://googleapis.com">
  
  <style>
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #0b3c5d; /* Latar belakang Biru Tua Mediterania */
      color: #ffffff;
    }
    /* Mengatur tata letak logo dan teks agar sejajar di kiri */
    .header-container {
      display: flex;
      align-items: center;
      gap: 15px;
      padding-bottom: 15px;
    }
    .logo-brand {
      height: 60px;
      width: auto;
      object-fit: contain;
    }
    .text-brand {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }
    .brand-pgk {
      font-size: 24px;
      font-weight: 700;
      color: #ffffff;
    }
    .brand-navigator {
      font-size: 14px;
      font-weight: 600;
      color: #d9a74a; /* Warna emas logo */
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    hr {
      border: 0;
      border-top: 1px solid rgba(255, 255, 255, 0.2);
      margin-top: 0;
      margin-bottom: 40px;
    }
    /* Mengatur semua konten utama agar rata tengah */
    .main-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      max-width: 600px;
      margin: 0 auto;
    }
    /* Mengatur gaya teks Coming Soon menggunakan League Script dengan ukuran yang jauh lebih besar */
    .coming-soon-title {
      font-family: 'League Script', cursive; /* Mengaktifkan font tulisan sambung estetik */
      font-size: 64px; /* Ukuran digedepkan agar dominan dan mencuri perhatian */
      color: #d9a74a; /* Warna emas menyala */
      margin-top: 0;
      margin-bottom: 20px;
      text-transform: lowercase; /* Menjaga agar format hurufnya kecil anggun seperti di contoh gambar */
    }
    /* Mengatur wadah video agar responsif */
    .video-container {
      width: 100%;
      max-width: 450px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      margin-bottom: 35px;
    }
    video {
      width: 100%;
      height: auto;
      display: block;
    }
    /* Mengatur gaya tulisan slogan nilai proyek */
    .slogan-text {
      font-size: 18px;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <!-- Bagian Atas / Header Berlogo (Tetap Di Kiri) -->
  <div class="header-container">
    <img src="logo.jpeg" alt="Logo PGK Navigator" class="logo-brand">
    <div class="text-brand">
      <span class="brand-pgk">PGK</span>
      <span class="brand-navigator">Navigator</span>
    </div>
  </div>
  
  <hr>

  <!-- Bagian Isi Konten Baru (Rata Tengah) -->
  <div class="main-content">
    
    <!-- 1. Kalimat Coming Soon Bergaya Tulisan Sambung Gede -->
    <div class="coming-soon-title">coming soon...!</div>
    
    <!-- 2. Pemutar Video Animasi MP4 Otomatis -->
    <div class="video-container">
      <video autoplay muted loop playsinline>
        <source src="animasi.mp4" type="video/mp4">
        Browser Anda tidak mendukung pemutar video.
      </video>
    </div>
    
    <!-- 3. Slogan Nilai Proyek -->
    <div class="slogan-text">Explore • Connect • Grow</div>
    
  </div>

</body>
</html>
