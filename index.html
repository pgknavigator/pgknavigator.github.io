<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PGK Navigator - Coming Soon</title>
  <!-- Memanggil font Birthstone dan Inter langsung dengan metode pelindung ganda -->
  <link rel="preconnect" href="https://googleapis.com">
  <link rel="preconnect" href="https://gstatic.com" crossorigin>
  <link href="https://googleapis.com/css2?family=Birthstone&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 20px;
      /* Memasang gambar latar belakang bg.jpg agar memenuhi seluruh layar secara proporsional */
      background-image: url('bg.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      color: #333333;
    }
    /* Mengatur tata letak logo dan teks agar sejajar di kiri */
    .header-container {
      display: flex;
      align-items: center;
      gap: 15px;
      padding-bottom: 15px;
    }
    .logo-brand {
      height: 60px;
      width: auto;
      object-fit: contain;
    }
    .text-brand {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }
    .brand-pgk {
      font-size: 24px;
      font-weight: 700;
      color: #0b3c5d; /* Kembali ke warna biru mediterania agar kontras dengan latar putih */
    }
    .brand-navigator {
      font-size: 14px;
      font-weight: 600;
      color: #d9a74a; /* Warna emas logo */
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    hr {
      border: 0;
      border-top: 1px solid rgba(11, 60, 93, 0.2); /* Garis pembatas tipis berwarna biru transparan */
      margin-top: 0;
      margin-bottom: 40px;
    }
    /* Mengatur semua konten utama agar rata tengah */
    .main-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      max-width: 600px;
      margin: 0 auto;
    }
    /* Mengatur gaya teks Birthstone dengan rumus paksa agar membuang cache lama browser */
    .coming-soon-title {
      font-family: 'Birthstone', cursive !important;
      font-size: 85px; 
      color: #0b3c5d; /* Diubah ke warna biru tua mediterania agar sangat tajam di atas latar putih */
      margin-top: 10px;
      margin-bottom: 0;
      padding-bottom: 0;
      line-height: 1;
      text-transform: lowercase;
      text-shadow: 1px 1px 0px #ffffff; /* Efek bayangan putih tipis di belakang teks agar makin pop-out */
    }
    /* Mengatur wadah video dengan jarak aman yang lapang agar tidak menempel */
    .video-container {
      width: 100%;
      max-width: 450px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15); /* Bayangan disesuaikan agar lebih natural di latar terang */
      margin-top: 50px; /* Menjaga posisi video tetap turun ke bawah memberi ruang napas teks */
      margin-bottom: 35px;
    }
    video {
      width: 100%;
      height: auto;
      display: block;
    }
    /* Mengatur gaya tulisan slogan nilai proyek */
    .slogan-text {
      font-size: 18px;
      font-weight: 600;
      color: #d9a74a; /* Diubah ke warna emas agar senada dengan nuansa geometris kuning */
      letter-spacing: 3px;
      text-transform: uppercase;
      text-shadow: 1px 1px 0px #ffffff;
    }
  </style>
</head>
<body>

  <!-- Bagian Atas / Header Berlogo (Tetap Di Kiri) -->
  <div class="header-container">
    <img src="logo.jpeg" alt="Logo PGK Navigator" class="logo-brand">
    <div class="text-brand">
      <span class="brand-pgk">PGK</span>
      <span class="brand-navigator">Navigator</span>
    </div>
  </div>
  
  <hr>

  <!-- Bagian Isi Konten Baru (Rata Tengah) -->
  <div class="main-content">
    
    <!-- 1. Kalimat Coming Soon Bergaya Birthstone Biru Tua -->
    <div class="coming-soon-title">coming soon...</div>
    
    <!-- 2. Pemutar Video Animasi MP4 Otomatis -->
    <div class="video-container">
      <video autoplay muted loop playsinline>
        <source src="animasi.mp4" type="video/mp4">
        Browser Anda tidak mendukung pemutar video.
      </video>
    </div>
    
    <!-- 3. Slogan Nilai Proyek Warna Emas -->
    <div class="slogan-text">Explore • Connect • Grow</div>
    
  </div>

</body>
</html>
