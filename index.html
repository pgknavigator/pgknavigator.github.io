<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PGK Navigator - Coming Soon</title>
  <!-- Memanggil font Birthstone langsung dari server Google secara maksimal -->
  <link rel="preconnect" href="https://googleapis.com">
  <link rel="preconnect" href="https://gstatic.com" crossorigin>
  <link href="https://googleapis.com/css2?family=Birthstone&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #0b3c5d; 
      color: #ffffff;
    }
    .header-container {
      display: flex;
      align-items: center;
      gap: 15px;
      padding-bottom: 15px;
    }
    .logo-brand {
      height: 60px;
      width: auto;
      object-fit: contain;
    }
    .text-brand {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }
    .brand-pgk {
      font-size: 24px;
      font-weight: 700;
      color: #ffffff;
    }
    .brand-navigator {
      font-size: 14px;
      font-weight: 600;
      color: #d9a74a;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    hr {
      border: 0;
      border-top: 1px solid rgba(255, 255, 255, 0.2);
      margin-top: 0;
      margin-bottom: 40px;
    }
    .main-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      max-width: 600px;
      margin: 0 auto;
    }
    /* Memperbaiki gaya tulisan Birthstone agar tidak menutupi animasi */
    .coming-soon-title {
      font-family: 'Birthstone', cursive !important; /* !important memaksa browser patuh */
      font-size: 90px; /* Ukuran besar yang anggun */
      color: #d9a74a; 
      margin-top: 0;
      margin-bottom: -10px; /* Mengatur ruang remas yang pas */
      padding-bottom: 0;
      line-height: 0.9;
      text-transform: lowercase;
    }
    /* Memberikan jarak atas ekstra pada wadah video agar tidak tertutup teks */
    .video-container {
      width: 100%;
      max-width: 450px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      margin-top: 25px; /* Jarak aman pelindung dari tabrakan teks */
      margin-bottom: 35px;
    }
    video {
      width: 100%;
      height: auto;
      display: block;
    }
    .slogan-text {
      font-size: 18px;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="header-container">
    <img src="logo.jpeg" alt="Logo PGK Navigator" class="logo-brand">
    <div class="text-brand">
      <span class="brand-pgk">PGK</span>
      <span class="brand-navigator">Navigator</span>
    </div>
  </div>
  
  <hr>

  <div class="main-content">
    <div class="coming-soon-title">coming soon...!</div>
    
    <div class="video-container">
      <video autoplay muted loop playsinline>
        <source src="animasi.mp4" type="video/mp4">
        Browser Anda tidak mendukung pemutar video.
      </video>
    </div>
    
    <div class="slogan-text">Explore • Connect • Grow</div>
  </div>

</body>
</html>
