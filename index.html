<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PGK Navigator - Coming Soon</title>
  <!-- Menyisipkan font modern Inter dan font piksel digital DotGothic16 -->
  <link rel="stylesheet" href="https://googleapis.com">
  
  <style>
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #0b3c5d; /* Mengubah latar belakang menjadi Biru Tua Mediterania */
      color: #ffffff; /* Mengubah teks utama menjadi putih agar kontras */
    }
    /* Mengatur tata letak logo dan teks agar sejajar di kiri */
    .header-container {
      display: flex;
      align-items: center;
      gap: 15px;
      padding-bottom: 15px;
    }
    .logo-brand {
      height: 60px;
      width: auto;
      object-fit: contain;
    }
    .text-brand {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }
    .brand-pgk {
      font-size: 24px;
      font-weight: 700;
      color: #ffffff; /* Mengubah teks PGK menjadi putih terang di atas latar gelap */
    }
    .brand-navigator {
      font-size: 14px;
      font-weight: 600;
      color: #d9a74a; /* Warna emas logo tetap dipertahankan */
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    hr {
      border: 0;
      border-top: 1px solid rgba(255, 255, 255, 0.2); /* Garis pembatas tipis transparan yang elegan */
      margin-top: 0;
      margin-bottom: 40px;
    }
    /* Mengatur semua konten utama agar rata tengah */
    .main-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      max-width: 600px;
      margin: 0 auto;
    }
    /* Mengatur gaya teks Coming Soon menggunakan font piksel digital */
    .coming-soon-title {
      font-family: 'DotGothic16', sans-serif; /* Mengaktifkan font piksel kotak digital */
      font-size: 36px;
      color: #d9a74a; /* Menggunakan warna emas menyala sesuai kesepakatan */
      margin-bottom: 25px;
      letter-spacing: 1px;
    }
    /* Mengatur wadah video agar responsif */
    .video-container {
      width: 100%;
      max-width: 450px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3); /* Efek bayangan lebih tebal agar video terlihat pop-out di latar gelap */
      margin-bottom: 30px;
    }
    video {
      width: 100%;
      height: auto;
      display: block;
    }
    /* Mengatur gaya tulisan slogan nilai proyek */
    .slogan-text {
      font-size: 18px;
      font-weight: 600;
      color: #ffffff; /* Slogan diubah menjadi putih bersih */
      letter-spacing: 3px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <!-- Bagian Atas / Header Berlogo (Tetap Di Kiri) -->
  <div class="header-container">
    <img src="logo.jpeg" alt="Logo PGK Navigator" class="logo-brand">
    <div class="text-brand">
      <span class="brand-pgk">PGK</span>
      <span class="brand-navigator">Navigator</span>
    </div>
  </div>
  
  <hr>

  <!-- Bagian Isi Konten Baru (Rata Tengah) -->
  <div class="main-content">
    
    <!-- 1. Kalimat Coming Soon Bergaya Piksel Digital -->
    <div class="coming-soon-title">coming soon...!</div>
    
    <!-- 2. Pemutar Video Animasi MP4 Otomatis -->
    <div class="video-container">
      <video autoplay muted loop playsinline>
        <source src="animasi.mp4" type="video/mp4">
        Browser Anda tidak mendukung pemutar video.
      </video>
    </div>
    
    <!-- 3. Slogan Nilai Proyek -->
    <div class="slogan-text">Explore • Connect • Grow</div>
    
  </div>

</body>
</html>
