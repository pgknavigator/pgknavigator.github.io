<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PGK Navigator - Pendamping UMKM</title>
  <!-- Menyisipkan font modern inter agar nyaman dibaca -->
  <link rel="stylesheet" href="https://googleapis.com">
  
  <style>
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #ffffff;
      color: #333333;
    }
    /* Mengatur tata letak logo dan teks agar sejajar di kiri */
    .header-container {
      display: flex;
      align-items: center;
      gap: 15px; /* Jarak antara logo dan tulisan */
      padding-bottom: 15px;
    }
    /* Mengatur ukuran logo sedikit lebih besar dari tinggi teks brand */
    .logo-brand {
      height: 60px; /* Tinggi logo ideal untuk HP dan laptop */
      width: auto;
      object-fit: contain;
    }
    /* Mengatur gaya tulisan brand kekinian */
    .text-brand {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }
    .brand-pgk {
      font-size: 24px;
      font-weight: 700;
      color: #0b3c5d; /* Warna biru mediterania sesuai logo */
    }
    .brand-navigator {
      font-size: 14px;
      font-weight: 600;
      color: #d9a74a; /* Warna emas/kuning mustard sesuai logo */
      text-transform: uppercase;
      letter-spacing: 2px; /* Jarak antar huruf agar premium */
    }
    hr {
      border: 0;
      border-top: 1px solid #e0e0e0;
      margin-top: 0;
      margin-bottom: 30px;
    }
    h1 {
      font-size: 26px;
      font-weight: 700;
      color: #222222;
      line-height: 1.3;
    }
    p {
      font-size: 16px;
      line-height: 1.6;
      color: #555555;
    }
  </style>
</head>
<body>

  <!-- Bagian Atas / Header Berlogo -->
  <div class="header-container">
    <img src="logo.jpeg" alt="Logo PGK Navigator" class="logo-brand">
    <div class="text-brand">
      <span class="brand-pgk">PGK</span>
      <span class="brand-navigator">Navigator</span>
    </div>
  </div>
  
  <hr>

  <!-- Bagian Isi Konten Web -->
  <h1>Selamat Datang di Web Pendamping Perizinan Sederhana UMKM</h1>
  <p>Platform digital terpercaya untuk membantu legalitas dan pertumbuhan usaha mikro, kecil, dan menengah Anda.</p>

</body>
</html>
